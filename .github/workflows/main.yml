name: US-Quant-Auto-Scanner

on:
  schedule:
    - cron: '58 21 * * 0-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # [보완] 충돌 해결을 위해 전체 이력 필요

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip' # [보완] 라이브러리 캐싱으로 속도 향상

      - name: Install Libs
        run: |
          pip install yfinance pandas pandas_ta numpy requests lxml pytz

      - name: Run Script
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py

      - name: Commit and push state files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # [보완] 새로 생긴 sector_cache.json도 관리 대상에 포함
          git add *.json *.txt
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "📈 자동 업데이트: 포지션 및 섹터 캐시 갱신"
            # [보완] 푸시 전 서버의 최신 상태와 합치기 (충돌 방지 핵심)
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit"
          fi
