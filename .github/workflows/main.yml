name: US-Quant-Auto-Scanner

on:
  schedule:
    # 한국 시간(KST) 기준 월요일 아침 6:58 ~ 토요일 아침 6:58
    # UTC 기준 일요일(0) 21:58 ~ 금요일(5) 21:58
    - cron: '58 21 * * 0-5'
    
  workflow_dispatch: # 필요할 때 언제든 버튼 눌러서 수동 실행 가능

# ✅ 깃허브 액션 봇이 파일(장부)을 수정하고 덮어쓸 수 있도록 '쓰기 권한' 부여
permissions:
  contents: write

jobs:
  run-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install Libs
        # 📌 의존성 에러 방지를 위해 numpy 명시적 추가
        run: pip install yfinance pandas pandas_ta numpy requests lxml
        
      - name: Run Script
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py

      # ✅ [핵심] 봇이 오늘 업데이트한 장부(.json) 및 위키피디아 캐시(.txt) 영구 저장!
      - name: Commit and push state files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 📌 캐시 파일도 깃허브에 저장되도록 *.txt 추가
          git add *.json *.txt
          # 변경된 파일이 있을 때만 커밋(저장)하고 푸시(업로드)해라
          git diff-index --quiet HEAD || git commit -m "📈 자동 업데이트: 포지션, 주문 상태 및 티커 캐시 갱신"
          git push
