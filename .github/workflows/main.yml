name: US-Quant-Auto-Scanner

on:
  schedule:
    # KST 06:58 실행
    # UTC 21:58 (한국 -9시간)
    - cron: '58 21 * * 0-5'
    
  workflow_dispatch:

jobs:
  run-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install Libs
        run: pip install yfinance pandas pandas_ta requests lxml
        
      - name: Run Script
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py
