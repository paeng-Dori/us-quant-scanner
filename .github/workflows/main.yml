name: US-Quant-Auto-Scanner

on:
  schedule:
    # KST 월~토 06:58  → UTC 일~금 21:58
    - cron: "58 21 * * 0-5"
  workflow_dispatch:

# ✅ 동시 실행 방지 (상태파일 꼬임 방지)
concurrency:
  group: us-quant-auto-scanner
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Libs
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas pandas_ta requests lxml

      - name: Run Script
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py

      - name: Commit and push state files (json/txt)
        run: |
          # ✅ exit 128 주요 원인(소유권/브랜치/DETACHED HEAD) 방지
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="${GITHUB_REF_NAME}"

          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          git pull --rebase origin "$BRANCH"

          git add -A

          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi

          git commit -m "Update state files (auto)"
          git push origin "HEAD:$BRANCH"
